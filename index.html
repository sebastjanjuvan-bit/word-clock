<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Clocks</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .clocks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      text-align: center;
    }

    .clock {
      padding: 20px;
      border-radius: 12px;
      background: #1e293b;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .city {
      font-size: 1.2em;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .time {
      font-size: 2em;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="clocks">
  <div class="clock">
    <div class="city">Ljubljana</div>
    <div class="time" id="ljubljana"></div>
  </div>

  <div class="clock">
    <div class="city">New York</div>
    <div class="time" id="newyork"></div>
  </div>

  <div class="clock">
    <div class="city">Tokyo</div>
    <div class="time" id="tokyo"></div>
  </div>
</div>

<script>
  function updateTime() {
    const options = {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    };

    document.getElementById("ljubljana").textContent =
      new Date().toLocaleTimeString("en-GB", { ...options, timeZone: "Europe/Ljubljana" });

    document.getElementById("newyork").textContent =
      new Date().toLocaleTimeString("en-GB", { ...options, timeZone: "America/New_York" });

    document.getElementById("tokyo").textContent =
      new Date().toLocaleTimeString("en-GB", { ...options, timeZone: "Asia/Tokyo" });
  }

  setInterval(updateTime, 1000);
  updateTime();
</script>

</body>
</html>
